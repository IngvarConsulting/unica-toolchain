name: Build RLM release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_tag: ${{ steps.manifest.outputs.release_tag }}
      upstream_repository: ${{ steps.manifest.outputs.upstream_repository }}
      upstream_tag: ${{ steps.manifest.outputs.upstream_tag }}
      upstream_commit: ${{ steps.manifest.outputs.upstream_commit }}
      python_version: ${{ steps.manifest.outputs.python_version }}
      uv_version: ${{ steps.manifest.outputs.uv_version }}
      pyinstaller_version: ${{ steps.manifest.outputs.pyinstaller_version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - id: manifest
        shell: bash
        run: |
          python - <<'PY'
          import importlib.util
          import os
          from pathlib import Path

          script = Path("scripts/build_rlm.py")
          spec = importlib.util.spec_from_file_location("build_rlm", script)
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          manifest = module.load_manifest(Path("manifests/rlm-tools-bsl.json"))
          values = {
              "release_tag": module.release_tag(manifest),
              "upstream_repository": manifest["upstreamRepository"],
              "upstream_tag": manifest["upstreamTag"],
              "upstream_commit": manifest["upstreamCommit"],
              "python_version": manifest["pythonVersion"],
              "uv_version": manifest["uvVersion"],
              "pyinstaller_version": manifest["pyinstallerVersion"],
          }
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as stream:
              for key, value in values.items():
                  stream.write(f"{key}={value}\n")
          PY

  build:
    needs: metadata
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-latest
          - target: darwin-arm64
            runner: macos-14
    env:
      UPSTREAM_REPOSITORY: ${{ needs.metadata.outputs.upstream_repository }}
      UPSTREAM_TAG: ${{ needs.metadata.outputs.upstream_tag }}
      UPSTREAM_COMMIT: ${{ needs.metadata.outputs.upstream_commit }}
      PYINSTALLER_VERSION: ${{ needs.metadata.outputs.pyinstaller_version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ needs.metadata.outputs.python_version }}
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ needs.metadata.outputs.uv_version }}
          enable-cache: false
      - name: Check out the pinned upstream source
        shell: bash
        run: |
          git clone --depth 1 --branch "$UPSTREAM_TAG" "$UPSTREAM_REPOSITORY" rlm-source
          test "$(git -C rlm-source rev-parse HEAD)" = "$UPSTREAM_COMMIT"
          echo "SOURCE_DATE_EPOCH=$(git -C rlm-source show -s --format=%ct HEAD)" >> "$GITHUB_ENV"
      - name: Create the frozen RLM environment
        shell: bash
        run: |
          uv sync --frozen --no-dev --directory rlm-source
          if [ "$RUNNER_OS" = "Windows" ]; then
            rlm_python="$PWD/rlm-source/.venv/Scripts/python.exe"
          else
            rlm_python="$PWD/rlm-source/.venv/bin/python"
          fi
          echo "RLM_PYTHON=$rlm_python" >> "$GITHUB_ENV"
      - name: Install the pinned native packager
        shell: bash
        run: uv pip install --python "$RLM_PYTHON" "pyinstaller==${PYINSTALLER_VERSION}"
      - name: Build both RLM entrypoints
        shell: bash
        run: >-
          "$RLM_PYTHON" scripts/build_rlm.py
          --manifest manifests/rlm-tools-bsl.json
          --source-dir rlm-source
          --target "${{ matrix.target }}"
          --out-dir "dist/${{ matrix.target }}"
          --work-dir ".build/${{ matrix.target }}"
      - name: Smoke native entrypoints
        shell: bash
        run: |
          suffix=""
          if [ "${{ matrix.target }}" = "win-x64" ]; then suffix=".exe"; fi
          "dist/${{ matrix.target }}/rlm-tools-bsl-${{ matrix.target }}${suffix}" --help
          "dist/${{ matrix.target }}/rlm-bsl-index-${{ matrix.target }}${suffix}" --help
      - uses: actions/upload-artifact@v7
        with:
          name: rlm-toolchain-${{ matrix.target }}
          path: dist/${{ matrix.target }}
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [metadata, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          pattern: rlm-toolchain-*
          path: dist
          merge-multiple: true
      - name: Require the complete release matrix
        run: |
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          spec = importlib.util.spec_from_file_location("build_rlm", Path("scripts/build_rlm.py"))
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          actual = {path.name for path in Path("dist").iterdir() if path.is_file()}
          expected = module.expected_asset_names()
          missing = sorted(expected - actual)
          if missing:
              raise SystemExit(f"missing release assets: {missing}")
          for target in module.TARGETS:
              for name in (f"rlm-toolchain-{target}.json", f"checksums-{target}.txt"):
                  if name not in actual:
                      raise SystemExit(f"missing release metadata: {name}")
          PY
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          name: RLM tools BSL ${{ needs.metadata.outputs.release_tag }}
          body: |
            Reproducible native RLM entrypoints for Unica.

            Upstream: `${{ needs.metadata.outputs.upstream_repository }}`
            Tag: `${{ needs.metadata.outputs.upstream_tag }}`
            Commit: `${{ needs.metadata.outputs.upstream_commit }}`
          make_latest: false
          fail_on_unmatched_files: true
          files: dist/*
